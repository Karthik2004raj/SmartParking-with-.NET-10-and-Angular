<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Smart Parking System</h2>
    
    <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded mb-4">
      {{ error }}
    </div>
    
    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Username</label>
        <input type="text" [(ngModel)]="username" name="username" class="w-full p-2 border rounded" required>
      </div>
      
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Password</label>
        <input type="password" [(ngModel)]="password" name="password" class="w-full p-2 border rounded" required>
      </div>
      
      <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>
    
    <div class="mt-4 text-sm text-gray-600 text-center">
      <p>Demo: admin / Admin123!</p>
    </div>
  </div>
</div>
